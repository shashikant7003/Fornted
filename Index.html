<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Downloader 🚀</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: radial-gradient(circle, #f5f5f7 0%, #e5e5ea 100%); color: #1d1d1f; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 440px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.06); text-align: center; }
        h2 { font-size: 28px; font-weight: 700; color: #000000; margin-bottom: 8px; }
        p { font-size: 14px; color: #86868b; margin-bottom: 30px; }
        input[type="text"] { width: 100%; padding: 16px 18px; border-radius: 12px; border: 1px solid #d2d2d7; background-color: #ffffff; color: #1d1d1f; font-size: 15px; outline: none; margin-bottom: 25px; }
        input[type="text"]:focus { border-color: #000000; box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.07); }
        button { background-color: #000000; color: #ffffff; border: none; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 12px; cursor: pointer; width: 100%; transition: all 0.3s ease; }
        button:hover { background-color: #1d1d1f; transform: translateY(-2px); }
        .loading-text { display: none; font-size: 14px; color: #000000; margin-top: 15px; font-weight: 500; align-items: center; justify-content: center; gap: 8px; }
        .spinner { width: 18px; height: 18px; border: 2px solid #e5e5ea; border-top: 2px solid #000000; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        .error-box { display: none; margin-top: 15px; padding: 12px; background: #ffefef; border: 1px solid #ffcccc; border-radius: 10px; color: #ff3b30; font-size: 13px; }
        .footer { margin-top: 35px; font-size: 11px; color: #86868b; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Universal Downloader</h2>
        <p>Enter a link to download instantly</p>
        
        <input type="text" id="video-url" placeholder="Paste link here..." required>
        <button id="dl-btn" onclick="fetchLink()">Download Now</button>
        
        <div class="loading-text" id="loader">
            <div class="spinner"></div> Fetching secure stream... Please wait
        </div>
        
        <div class="error-box" id="error-display"></div>
        
        <div class="footer">Exclusively for friends • Decentralized UI</div>
    </div>

    <script>
        // 🛑 IMPORTANT: Yahan apne Render backend ka real URL lagao (bina aakhri slash / ke)
        const BACKEND_URL = "https://backend-zsa1.onrender.com";

        async function fetchLink() {
            const urlInput = document.getElementById('video-url').value;
            const btn = document.getElementById('dl-btn');
            const loader = document.getElementById('loader');
            const errorBox = document.getElementById('error-display');
            
            if(!urlInput) return alert("Please paste a link first!");
            
            // UI Update for loading
            btn.style.opacity = '0.5';
            btn.innerText = 'Connecting...';
            loader.style.display = 'flex';
            errorBox.style.display = 'none';
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/get-download-link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });
                
                const result = await response.json();
                
                if(result.success && result.download_url) {
                    // Video stream milte hi automatically new window mein download trigger kar do
                    window.location.href = result.download_url;
                } else {
                    throw new Error(result.error || "Failed to fetch stream.");
                }
            } catch (err) {
                errorBox.innerText = "❌ Error: " + err.message;
                errorBox.style.display = 'block';
            } finally {
                btn.style.opacity = '1';
                btn.innerText = 'Download Now';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
